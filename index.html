<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>音绘星 - 自闭症儿童认知能力结构化提升系统</title>
  <style>
    * { box-sizing: border-box; }

    /* 童趣马卡龙配色系统 */
    :root {
      --bg: #F2F8FF;           /* 柔和的云朵蓝背景 */
      --panel: #FFFFFF;        /* 纯白面板 */
      --panel-2: #FFF9E6;      /* 暖暖的浅鹅黄 */
      --stroke: #D6E4F0;       /* 柔和的描边蓝 */
      --text: #4A5568;         /* 深灰蓝文字，比纯黑更温和 */
      --muted: #A0AEC0;        /* 辅助文字颜色 */
      
      /* 玩具色块 */
      --brand: #FF9EBB;        /* 草莓粉 */
      --brand-shadow: #E87A9A;
      --brand-2: #84C5F4;      /* 晴空蓝 */
      --brand-2-shadow: #63A2D8;
      --brand-3: #FBD38D;      /* 芒果黄 */
      --brand-3-shadow: #E5B760;
      --brand-4: #9AE6B4;      /* 薄荷绿 */
      --brand-4-shadow: #74C693;

      --radius: 28px;          /* 超大圆角，像鹅卵石 */
    }

    body { 
      /* 使用更圆润可爱的字体集 */
      font-family: 'Nunito', 'Varela Round', 'PingFang SC', 'Comic Sans MS', 'Microsoft YaHei', sans-serif; 
      margin: 0; 
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 15% 50%, rgba(255, 158, 187, 0.08), transparent 25%),
                  radial-gradient(circle at 85% 30%, rgba(132, 197, 244, 0.12), transparent 25%),
                  radial-gradient(circle at 50% 80%, rgba(251, 211, 141, 0.1), transparent 25%),
                  var(--bg);
      color: var(--text);
    }

    /* 整体字号放大，保护视力 */
    body, input, select, textarea, button { font-size: 18px; }
    
    .container {
      display: grid;
      grid-template-columns: 360px minmax(700px, 1fr);
      gap: 24px;
      height: 100vh;
      padding: 24px;
    }
    
    /* 左右面板都做成圆滚滚的厚白板 */
    .left-panel, .right-panel {
      background: var(--panel);
      border: 4px solid var(--stroke);
      border-radius: var(--radius);
      padding: 24px;
      overflow-y: auto;
      box-shadow: 0 12px 24px rgba(132, 197, 244, 0.15);
    }
    
    /* 隐藏滚动条让界面更干净（保留滚动功能） */
    .left-panel::-webkit-scrollbar, .right-panel::-webkit-scrollbar { width: 8px; }
    .left-panel::-webkit-scrollbar-thumb, .right-panel::-webkit-scrollbar-thumb { 
      background: var(--stroke); 
      border-radius: 10px; 
    }
    
    h1 { font-size: 28px; margin: 0 0 8px 0; color: var(--brand-2-shadow); font-weight: 900;}
    h2 { font-size: 22px; margin: 16px 0 12px 0; color: #6B7280; }
    h3 { font-size: 18px; margin: 12px 0 8px 0; color: var(--brand-2-shadow); }
    
    label { 
      font-weight: 800; 
      display: block; 
      margin-top: 16px; 
      font-size: 16px;
      color: var(--brand-2-shadow);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    label::before { content: '✨'; font-size: 14px; }
    
    /* 输入框：像胖乎乎的小气泡 */
    input, select, textarea { 
      width: 100%; 
      padding: 14px 18px; 
      margin: 8px 0 16px; 
      border: 3px solid var(--stroke); 
      border-radius: 20px; 
      background: #F8FAFC;
      color: var(--text);
      font-weight: 600;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--brand-2);
      background: #FFFFFF;
      box-shadow: 0 0 0 6px rgba(132, 197, 244, 0.2);
    }
    
    textarea { min-height: 100px; resize: vertical; }
    
    /* 核心交互：3D玩具按钮 */
    button { 
      padding: 14px 20px; 
      cursor: pointer; 
      background: var(--brand-2);
      color: white; 
      border: none; 
      border-radius: 20px; 
      font-size: 18px; 
      font-weight: 900;
      width: 100%;
      margin: 8px 0;
      /* 制造物理厚度感 */
      box-shadow: 0 6px 0 var(--brand-2-shadow);
      transition: all 0.1s ease;
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      gap: 10px;
    }
    
    button:hover { 
      filter: brightness(1.05); 
      transform: translateY(-2px);
      box-shadow: 0 8px 0 var(--brand-2-shadow);
    }
    
    button:active { 
      transform: translateY(6px); /* 按下时的物理反馈 */
      box-shadow: 0 0 0 var(--brand-2-shadow);
    }
    
    button:disabled { 
      background: #E2E8F0; 
      color: #A0AEC0;
      box-shadow: 0 6px 0 #CBD5E0; 
      cursor: not-allowed; 
      transform: none !important;
    }

    /* 区分不同功能的按钮颜色 */
    .btn-prev { background: var(--brand-4); box-shadow: 0 6px 0 var(--brand-4-shadow); }
    .btn-prev:hover { box-shadow: 0 8px 0 var(--brand-4-shadow); }
    .btn-prev:active { box-shadow: 0 0 0 var(--brand-4-shadow); }

    .btn-next { background: var(--brand-2); box-shadow: 0 6px 0 var(--brand-2-shadow); }
    .btn-next:hover { box-shadow: 0 8px 0 var(--brand-2-shadow); }
    .btn-next:active { box-shadow: 0 0 0 var(--brand-2-shadow); }

    .btn-regenerate { background: var(--brand-3); box-shadow: 0 6px 0 var(--brand-3-shadow); color: #744210;}
    .btn-regenerate:hover { box-shadow: 0 8px 0 var(--brand-3-shadow); }
    .btn-regenerate:active { box-shadow: 0 0 0 var(--brand-3-shadow); }
    
    .nav-buttons { display: flex; gap: 16px; margin: 20px 0; }
    .nav-buttons button { flex: 1; margin: 0; }
    
    .muted { color: var(--muted); font-size: 14px; font-weight: 600;}
    .ok { color: var(--brand-4-shadow); font-weight: 800; }
    .err { color: var(--brand-shadow); font-weight: 800; }
    
    /* 区块变成可爱的小卡片 */
    .section { 
      margin: 16px 0; 
      padding: 20px; 
      background: #FFFFFF;
      border-radius: 24px;
      border: 3px solid var(--stroke);
    }
    
    /* 角色信息卡片使用暖黄底色 */
    .character-info { 
      padding: 18px; 
      background: var(--panel-2);
      border-radius: 24px;
      margin: 16px 0; 
      font-size: 16px;
      font-weight: 600;
      border: 3px dashed var(--brand-3);
      color: #975A16;
    }
    
    .loading { 
      display: inline-block; 
      width: 20px; 
      height: 20px; 
      border: 4px solid var(--stroke); 
      border-top: 4px solid var(--brand-2); 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .step-content { display: none; }
    .step-content.active { display: block; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.95) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .step-header {
      margin-bottom: 20px;
      padding: 24px;
      border-radius: var(--radius);
      border: 4px solid var(--brand-2);
      background: #EBF8FF;
    }
    
    .step-header h2 { color: var(--brand-2-shadow); margin: 0 0 12px 0; font-size: 26px; font-weight: 900;}
    .step-info { color: #4A5568; font-size: 16px; line-height: 1.6; font-weight: 600;}
    
    /* 进度指示器：像一串糖葫芦/小彩珠 */
    .step-indicator {
      display: flex;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .step-dot {
      flex: 1;
      min-height: 60px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 10px 14px;
      font-weight: 800;
      font-size: 15px;
      border: 3px solid var(--stroke);
      background: #F8FAFC;
      color: var(--muted);
      gap: 10px;
      transition: all 0.3s ease;
    }
    
    .step-dot-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--stroke);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .step-dot.active {
      background: var(--brand-2);
      color: white;
      border-color: var(--brand-2-shadow);
      transform: scale(1.05);
      box-shadow: 0 6px 16px rgba(132, 197, 244, 0.4);
    }
    .step-dot.active .step-dot-num { background: white; color: var(--brand-2); }
    
    .step-dot.completed {
      background: var(--brand-4);
      color: white;
      border-color: var(--brand-4-shadow);
    }
    .step-dot.completed .step-dot-num { background: white; color: var(--brand-4); }
    
    /* 播放器区域优化 */
    .global-audio-area {
      background: #FFF5F7;
      border: 4px dashed var(--brand);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin: 20px auto 0;
      width: 100%;
      max-width: 832px;
    }

    .global-audio-title { font-weight: 900; font-size: 18px; margin-bottom: 12px; color: var(--brand-shadow); }
    .global-audio-controls { display: flex; align-items: center; gap: 16px; }

    .audio-control-btn {
      width: 56px;
      height: 56px;
      border-radius: 20px;
      border: none;
      background: var(--brand);
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 0 var(--brand-shadow);
      transition: all 0.1s;
    }
    .audio-control-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 var(--brand-shadow); }
    .audio-control-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--brand-shadow); }
    .audio-control-btn.pause { background: var(--brand-3); box-shadow: 0 6px 0 var(--brand-3-shadow); }
    .audio-control-btn.restart { background: var(--brand-4); box-shadow: 0 6px 0 var(--brand-4-shadow); }

    .audio-progress-container { flex: 1; display: flex; align-items: center; gap: 16px; }
    .audio-progress-bar {
      flex: 1;
      height: 24px;
      background: #FFE4E6;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      border: 2px solid #FECDD3;
    }
    .audio-progress-fill {
      height: 100%;
      background: var(--brand);
      border-radius: 10px;
      position: relative;
    }
    .audio-progress-thumb {
      width: 24px;
      height: 24px;
      background: white;
      border: 4px solid var(--brand);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      right: -12px;
      transform: translateY(-50%);
      box-shadow: 0 2px 6px rgba(255,158,187,0.5);
    }
    .audio-time { font-size: 16px; color: var(--brand-shadow); font-weight: 800; font-family: 'Comic Sans MS', monospace;}

    .content-grid { display: flex; flex-direction: column; align-items: center; gap: 24px; margin: 20px 0; }
    
    .content-box {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 24px;
      border: 4px solid var(--stroke);
      width: 100%;
    }
    
    /* 歌词区域：像一张便签纸 */
    .lyrics-box {
      background: var(--panel-2);
      padding: 24px 32px;
      border-radius: 20px;
      border: 3px dashed var(--brand-3);
      white-space: pre-wrap;
      font-size: 24px; /* 超大字号方便儿童认读 */
      font-weight: 800;
      line-height: 1.8;
      text-align: center;
      color: #975A16;
      max-width: 900px;
      width: 100%;
      margin-top: 20px;
    }
    
    /* 图片相框 */
    .image-box {
      width: 100%;
      max-width: 832px;
      aspect-ratio: 16/9;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8FAFC;
      border-radius: 24px;
      border: 6px solid #E2E8F0;
      position: relative;
      overflow: hidden;
      margin: 0 auto;
    }
    .image-box img { width: 100%; height: 100%; object-fit: contain; }

    /* 下载按钮统一成可爱的圆角小方块 */
    .download-buttons-container { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;}
    .download-btn {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      font-size: 20px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    }
    .download-btn-lyrics { background: var(--brand-2); }
    .download-btn-image { background: var(--brand-4); }
    .download-btn-audio { background: var(--brand-3); }
    .download-btn-all { background: #B794F4; box-shadow: 0 4px 0 #9F7AEA; }
    .download-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }

    /* 模态框和历史记录 */
    .history-btn { background: #A0AEC0; box-shadow: 0 6px 0 #718096; }
    .history-modal { background: rgba(74, 85, 104, 0.6); backdrop-filter: blur(4px); z-index: 3100; }
    .history-modal-content {
      border-radius: 32px;
      border: 6px solid var(--brand-2);
      background: var(--panel);
      padding: 32px;
    }
    .history-item { border: 3px solid var(--stroke); border-radius: 20px; padding: 16px; }
    .history-item:hover { border-color: var(--brand-2); transform: scale(1.02); }
    
    .auth-modal { background: rgba(74, 85, 104, 0.6); backdrop-filter: blur(4px); z-index: 3200;}
    .auth-modal-content { border-radius: 32px; border: 6px solid var(--brand-2); }

    /* 积木动画改造得更圆润柔和 */
    .building-animation { background: rgba(242, 248, 255, 0.95); z-index: 1000; }
    .building-title { font-size: 28px; color: var(--brand-2-shadow); font-weight: 900; }
    .building-block { border-radius: 16px; }
    
    #welcomeMessage { color: var(--brand-2) !important; padding: 120px 20px !important; }
    #welcomeMessage h2 { font-size: 48px !important; color: var(--brand-2-shadow) !important; font-weight: 900;}
    #welcomeMessage p { font-size: 24px !important; font-weight: 800; color: var(--muted) !important;}

    /* 隐藏功能提示等非核心信息，减少视觉噪音 */
    .step-loop-hint { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding: 10px 12px; border-radius: 16px; background: rgba(255,255,255,0.8); border: 1px solid var(--stroke); box-shadow: 0 4px 8px rgba(132, 197, 244, 0.1);">
        <img src="yinhuixing.png" alt="音绘星" style="width: 44px; height: 44px; object-fit: contain;" />
        <div>
          <h1 style="margin: 0; font-size: 22px; color: var(--brand-2-shadow);">音绘星</h1>
          <div class="muted" style="font-size: 12px; margin-top: 2px;">3-6岁儿童认知学习</div>
      </div>
      </div>

      <div class="section" id="authGuestSection">
        <h2 style="font-size: 16px; margin-top: 0;">🔐 账号</h2>
        <div class="auth-entry-actions" style="display: flex; gap: 10px; margin-top: 8px;">
          <button id="btnOpenLogin" style="margin: 0; flex: 1;">账号登录</button>
          <button id="btnOpenRegister" style="margin: 0; flex: 1; background: var(--brand-4); box-shadow: 0 6px 0 var(--brand-4-shadow);">注册账号</button>
        </div>
        <div id="authGuestHint" class="muted" style="margin-top: 12px; font-size: 12px; text-align: center;">点击按钮打开登录窗口</div>
      </div>

      <div class="section" id="authUserSection" style="display: none;">
        <h2 style="font-size: 16px; margin-top: 0;">👤 当前账号</h2>
        <div id="currentUsername" style="font-weight: 700; margin-bottom: 8px; color: var(--brand-2-shadow); font-size: 20px;">-</div>
        <div id="quotaInfo" class="muted" style="margin-bottom: 8px;">今日剩余：-</div>
        <button id="btnLogout" style="background: #A0AEC0; box-shadow: 0 6px 0 #718096;">退出登录</button>
      </div>

      <div class="section">
        <h2 style="font-size: 16px; margin-top: 0;">📝 设置学习目标</h2>
        <div class="muted" style="margin-top: 6px; font-size: 13px;">适合3-6岁儿童 · 色彩温柔 · 操作简单</div>
        
        <label>学习目标</label>
        <input id="userGoal" placeholder="例如：认识钟表" value="认识钟表" />

        <label>目标重点</label>
        <textarea id="learningFocus" placeholder="例如：让孩子学会认识时针和分针，理解时间的概念" rows="3"></textarea>

        <label>音乐风格</label>
        <select id="musicStyle">
          <option value="欢快" selected>欢快</option>
          <option value="温暖">温暖</option>
          <option value="舒缓">舒缓</option>
          <option value="童话">童话</option>
          <option value="custom">自定义输入</option>
        </select>
        <input id="musicStyleCustom" placeholder="请输入自定义音乐风格" style="display: none; margin-top: 6px;" />

        <label>音乐声音</label>
        <select id="musicVoice">
          <option value="男生" selected>男生</option>
          <option value="女生">女生</option>
          <option value="爸爸">爸爸</option>
          <option value="妈妈">妈妈</option>
          <option value="custom">自定义输入</option>
        </select>
        <input id="musicVoiceCustom" placeholder="请输入自定义声音类型" style="display: none; margin-top: 6px;" />

        <label>绘本风格</label>
        <select id="pictureBookStyle">
          <option value="柔和水彩扁平" selected>柔和水彩 · 轻彩</option>
          <option value="日系儿童绘本线稿">日系线稿 · 温柔</option>
          <option value="纸雕拼贴风">纸雕拼贴 · 质感</option>
          <option value="毛毡布艺手工风">毛毡布艺 · 手作</option>
          <option value="蜡笔童画风">蜡笔童画 · 天真</option>
          <option value="3D玩具公仔风">3D玩具 · 公仔</option>
          <option value="custom">自定义输入</option>
        </select>
        <input id="pictureBookStyleCustom" placeholder="请输入自定义绘本风格" style="display: none; margin-top: 6px;" />

        <label>角色选择</label>
        <select id="characterType">
          <option value="男生" selected>男生</option>
          <option value="女生">女生</option>
          <option value="爸爸">爸爸</option>
          <option value="妈妈">妈妈</option>
          <option value="动物">动物</option>
          <option value="custom">自定义输入</option>
        </select>
        <input id="characterTypeCustom" placeholder="请输入自定义角色类型" style="display: none; margin-top: 6px;" />

        <label>角色名称</label>
        <input id="characterName" placeholder="例如：乐乐" value="乐乐" />

        <button id="btnDecompose" style="margin-top: 16px;">🔍 分解学习目标</button>
        <div id="decomposeStatus" class="muted" style="margin-top: 12px; font-size: 12px; text-align: center;"></div>
      </div>

      <div id="characterInfo" class="character-info" style="display: none;">
        <strong>🎭 角色信息</strong>
        <div id="characterDetails" style="margin-top: 8px;"></div>
      </div>

      <div id="stepsSection" style="display: none;">
        <div class="section">
          <h2 style="font-size: 16px; margin-top: 0;">📚 学习步骤</h2>
          <div id="stepIndicator" class="step-indicator"></div>
          
          <div class="nav-buttons">
            <button id="btnPrev" class="btn-prev" disabled>◀ 上一步</button>
            <button id="btnNext" class="btn-next" disabled>下一步 ▶</button>
          </div>
          <div class="step-loop-hint">步骤可循环浏览：第4步点击“下一步”会回到第1步；第1步点击“上一步”会回到第4步。</div>
          
          <button id="btnRegenerate" class="btn-regenerate" disabled>🔄 重新生成</button>
          <button id="btnDeleteMusic" style="background: #E53E3E; box-shadow: 0 6px 0 #C53030; margin-top: 16px;" disabled>🗑 删除本次音乐</button>
          <button id="btnGenerateAll" style="display: none; background: #9F7AEA; box-shadow: 0 6px 0 #805AD5; margin-top: 16px;">⚡ 一次性生成所有内容</button>
          
          <div id="generateStatus" class="muted" style="margin-top: 12px; font-size: 12px; text-align: center;"></div>
        </div>
      </div>

      <div class="section" style="margin-top: 16px;">
        <button id="btnHistory" class="history-btn" onclick="showHistoryModal()">
          📚 历史生成
        </button>
      </div>


    </div>

    <div class="right-panel">
      <div id="welcomeMessage" style="text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
        <div style="display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px;">
          <img src="yinhuixing.png" alt="音绘星" style="width: 100px; height: 100px; object-fit: contain;" />
          <h2 style="margin: 0;">音绘星</h2>
        </div>
        <p>欢迎使用认知能力结构化提升系统</p>
        <p style="font-size: 18px !important; margin-top: 8px !important; opacity: 0.8;">请在左侧设置学习目标并开始分解</p>
      </div>

      <div id="stepsContainer" style="display: none;">
        </div>
    </div>
  </div>

  <div id="authModal" class="auth-modal" aria-hidden="true" style="position: fixed; inset: 0; display: none; align-items: center; justify-content: center;">
    <div class="auth-modal-content" role="dialog" aria-modal="true" aria-labelledby="authModalTitle" style="width: 100%; max-width: 480px; padding: 32px; background: #fff;">
      <div class="auth-modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h3 id="authModalTitle" class="auth-modal-title" style="margin: 0; font-size: 28px; color: var(--brand-2-shadow);">账号登录</h3>
        <button id="btnCloseAuthModal" class="auth-modal-close" title="关闭" style="background: none; border: none; font-size: 32px; color: var(--muted); cursor: pointer; padding: 0;">×</button>
      </div>
      <label>手机号</label>
      <input id="authPhone" placeholder="请输入手机号" />
      <label>密码</label>
      <input id="authPassword" type="password" placeholder="请输入密码（至少8位）" />
      <div id="authModalRegisterOnly" class="auth-modal-register-only" style="display: none; margin-top: 16px; padding-top: 16px; border-top: 2px dashed var(--stroke);">
        <label>验证码</label>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <input id="authVerifyCode" placeholder="请输入短信验证码" style="margin: 0; flex: 1;" />
          <button id="btnSendCode" style="margin: 0; white-space: nowrap; width: auto; padding: 0 20px; background: var(--brand-4); box-shadow: 0 6px 0 var(--brand-4-shadow);">发送验证码</button>
        </div>
      </div>
      <div class="auth-modal-actions" style="display: flex; gap: 16px; margin-top: 32px;">
        <button id="btnLogin" class="auth-mode-btn" style="flex: 1;">登录</button>
        <button id="btnRegister" class="auth-mode-btn" style="flex: 1; background: var(--brand-4); box-shadow: 0 6px 0 var(--brand-4-shadow); display: none;">注册</button>
      </div>
      <div id="authStatus" class="muted" style="margin-top: 16px; font-size: 14px; text-align: center;"></div>
    </div>
  </div>

  <div id="buildingAnimation" class="building-animation hidden" style="position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;">
    <div class="building-title">🎵 正在构建学习方案...</div>
    <div class="blocks-container" style="display: flex; gap: 12px; align-items: flex-end; margin-bottom: 30px;">
      <div class="building-block" style="width: 60px; height: 60px; background: var(--brand);"></div>
      <div class="building-block" style="width: 60px; height: 90px; background: var(--brand-2);"></div>
      <div class="building-block" style="width: 60px; height: 120px; background: var(--brand-3);"></div>
      <div class="building-block" style="width: 60px; height: 70px; background: var(--brand-4);"></div>
      <div class="building-block" style="width: 60px; height: 50px; background: var(--brand-shadow);"></div>
    </div>
    <div class="building-status" id="buildingStatus" style="font-size: 20px; font-weight: 800; color: var(--muted);">准备开始...</div>
  </div>

  <div id="historyModal" class="history-modal" style="position: fixed; inset: 0; display: none; align-items: center; justify-content: center;">
    <div class="history-modal-content" style="max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0; font-size: 24px; color: var(--brand-2-shadow);">📚 历史生成记录</h2>
        <button class="history-close-btn" onclick="hideHistoryModal()" title="关闭" style="background: none; border: none; font-size: 32px; color: var(--muted); cursor: pointer; padding: 0;">×</button>
      </div>
      <div class="history-container">
        <div id="historyList" class="history-list" style="display: flex; flex-direction: column; gap: 16px;">
          <div class="history-loading" style="text-align: center; color: var(--muted); padding: 40px;">正在加载历史记录...</div>
        </div>
        <div class="history-pagination" id="historyPagination" style="display: none; align-items: center; justify-content: center; gap: 16px; margin-top: 24px;">
          <button class="history-page-btn" id="historyPrevBtn" onclick="historyPrevPage()" style="width: 44px; height: 44px; border-radius: 12px; background: var(--stroke); border: none; color: white; cursor: pointer; font-size: 20px;">◀</button>
          <span class="history-page-info" id="historyPageInfo" style="font-weight: 800; color: var(--muted);">1 / 1</span>
          <button class="history-page-btn" id="historyNextBtn" onclick="historyNextPage()" style="width: 44px; height: 44px; border-radius: 12px; background: var(--brand-2); border: none; color: white; cursor: pointer; font-size: 20px;">▶</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  
  // 全局变量
  let decomposedData = null;
  let currentStepIndex = 0;
  let stepContents = []; // 存储所有步骤的内容缓存
  let isGeneratingAll = false;
  let currentSessionId = null; // 当前会话ID，用于保存文件
  let historyData = []; // 历史记录数据
  let historyCurrentPage = 1; // 当前历史记录页码
  const historyPageSize = 5; // 每页显示的历史记录数量
  let authToken = localStorage.getItem('auth_token') || '';
  let currentUser = null;
  let registerSmsOutId = '';
  let authModalMode = 'login';

  let isDecomposing = false; // 是否正在分解中

  // 全局音频播放器（单例）：确保切换步骤时音乐绝对不中断
  let globalAudio = null;
  let globalAudioSrc = '';
  let globalAudioBindingsReady = false;
  let globalAudioIsSeeking = false;
  let globalAudioPendingAutoplay = false;

  const rawFetch = window.fetch.bind(window);
  window.fetch = async function(input, init = {}) {
    const reqUrl = typeof input === 'string' ? input : (input && input.url) || '';
    const finalInit = { ...init };

    if (typeof reqUrl === 'string' && reqUrl.startsWith('/api/')) {
      const headers = new Headers(finalInit.headers || {});
      if (authToken && !headers.has('Authorization')) {
        headers.set('Authorization', `Bearer ${authToken}`);
      }
      finalInit.headers = headers;
    }

    const resp = await rawFetch(input, finalInit);
    if (
      typeof reqUrl === 'string' &&
      reqUrl.startsWith('/api/') &&
      !reqUrl.startsWith('/api/auth/') &&
      resp.status === 401
    ) {
      // 如果正在生成或分解中，不立即清空状态，让调用方处理错误
      if (!isGeneratingAll && !isDecomposing) {
        applyLoggedOutState('登录已过期，请重新登录');
      } else {
        console.warn('生成/分解进行中收到401，跳过自动退出，由调用方处理');
      }
    }
    return resp;
  };

  function setAuthStatus(text, type = 'muted') {
    const el = $('authStatus');
    if (el) {
      el.className = type;
      el.textContent = text || '';
    }
    const hint = $('authGuestHint');
    const modalOpen = $('authModal')?.classList.contains('active');
    if (hint && !modalOpen) {
      hint.className = type;
      hint.textContent = text || '点击按钮打开登录窗口';
    }
  }

  function setAuthModalMode(mode = 'login') {
    authModalMode = mode === 'register' ? 'register' : 'login';
    const isRegister = authModalMode === 'register';
    const titleEl = $('authModalTitle');
    const registerOnly = $('authModalRegisterOnly');
    const loginBtn = $('btnLogin');
    const registerBtn = $('btnRegister');
    const verifyInput = $('authVerifyCode');

    if (titleEl) titleEl.textContent = isRegister ? '注册账号' : '账号登录';
    if (registerOnly) registerOnly.style.display = isRegister ? 'block' : 'none';
    
    if (loginBtn) loginBtn.style.display = isRegister ? 'none' : 'block';
    if (registerBtn) registerBtn.style.display = isRegister ? 'block' : 'none';
    
    if (!isRegister && verifyInput) verifyInput.value = '';
  }

  function openAuthModal(mode = 'login') {
    setAuthModalMode(mode);
    const modal = $('authModal');
    if (!modal) return;
    modal.style.display = 'flex';
    modal.classList.add('active');
    modal.setAttribute('aria-hidden', 'false');
    setAuthStatus('');
    if (!$('authPhone').value.trim()) $('authPhone').focus();
  }

  function closeAuthModal() {
    const modal = $('authModal');
    if (!modal) return;
    modal.style.display = 'none';
    modal.classList.remove('active');
    modal.setAttribute('aria-hidden', 'true');
  }

  function setAppEnabled(enabled) {
    const ids = [
      'userGoal', 'learningFocus', 'musicStyle', 'musicStyleCustom',
      'musicVoice', 'musicVoiceCustom', 'pictureBookStyle', 'pictureBookStyleCustom',
      'characterType', 'characterTypeCustom', 'characterName',
      'btnDecompose', 'btnRegenerate', 'btnGenerateAll', 'btnHistory',
      'btnDeleteMusic'
    ];
    ids.forEach((id) => {
      const el = $(id);
      if (!el) return;
      if (enabled) {
        if (id === 'btnRegenerate') {
          el.disabled = !stepContents[currentStepIndex];
        } else if (id === 'btnDeleteMusic') {
          el.disabled = true;
        } else {
          el.disabled = false;
        }
      } else {
        el.disabled = true;
      }
    });
  }

  async function refreshQuota() {
    if (!authToken || !currentUser) return;
    try {
      const resp = await fetch('/api/quota/me');
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) return;
      const q = data?.quota || {};
      const text = `今日剩余：${q.remaining ?? '-'} / ${q.limit ?? '-'}（重置：${q.resetAt ? new Date(q.resetAt).toLocaleString('zh-CN') : '-'}）`;
      $('quotaInfo').textContent = text;
    } catch (e) {
      console.warn('refresh quota failed:', e);
    }
  }

  function applyLoggedInState(user, token, quota) {
    currentUser = user || null;
    authToken = token || authToken;
    if (authToken) localStorage.setItem('auth_token', authToken);
    $('authGuestSection').style.display = 'none';
    $('authUserSection').style.display = 'block';
    closeAuthModal();
    $('currentUsername').textContent = currentUser?.username || '-';
    setAuthStatus('');
    setAppEnabled(true);

    if (quota) {
      $('quotaInfo').textContent = `今日剩余：${quota.remaining ?? '-'} / ${quota.limit ?? '-'}（重置：${quota.resetAt ? new Date(quota.resetAt).toLocaleString('zh-CN') : '-'}）`;
    } else {
      refreshQuota();
    }
    updateNavigationButtons();
  }

  function applyLoggedOutState(message = '') {
    currentUser = null;
    authToken = '';
    registerSmsOutId = '';
    localStorage.removeItem('auth_token');
    $('authGuestSection').style.display = 'block';
    $('authUserSection').style.display = 'none';
    $('quotaInfo').textContent = '今日剩余：-';
    decomposedData = null;
    stepContents = [];
    currentStepIndex = 0;
    currentSessionId = null;
    $('stepsSection').style.display = 'none';
    $('stepsContainer').style.display = 'none';
    $('stepsContainer').innerHTML = '';
    $('welcomeMessage').style.display = 'flex';
    $('stepIndicator').innerHTML = '';
    $('characterInfo').style.display = 'none';
    clearGlobalAudioSource();
    setAppEnabled(false);
    closeAuthModal();
    if (message) {
      setAuthStatus(message, 'err');
    } else {
      setAuthStatus('点击按钮打开登录窗口', 'muted');
    }
  }

  async function restoreLogin() {
    if (!authToken) {
      applyLoggedOutState();
      return;
    }
    try {
      const resp = await fetch('/api/auth/me');
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok || !data?.user) {
        applyLoggedOutState('请先登录');
        return;
      }
      applyLoggedInState(data.user, authToken, data.quota);
    } catch (e) {
      applyLoggedOutState('无法连接服务器，请稍后重试');
    }
  }

  async function registerAccount() {
    setAuthModalMode('register');
    const phoneNumber = $('authPhone').value.trim();
    const password = $('authPassword').value;
    const verifyCode = $('authVerifyCode').value.trim();
    if (!phoneNumber || !password || !verifyCode) {
      setAuthStatus('注册需要手机号、密码和验证码', 'err');
      return;
    }
    setAuthStatus('注册中...');
    try {
      const resp = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phoneNumber, password, verifyCode, outId: registerSmsOutId }),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data?.error || '注册失败');
      applyLoggedInState(data.user, data.token, data.quota);
      $('authPassword').value = '';
      $('authVerifyCode').value = '';
      registerSmsOutId = '';
      setAuthStatus('注册并登录成功', 'ok');
    } catch (e) {
      setAuthStatus(`注册失败：${e?.message || e}`, 'err');
    }
  }

  async function loginAccount() {
    setAuthModalMode('login');
    const phoneNumber = $('authPhone').value.trim();
    const password = $('authPassword').value;
    if (!phoneNumber || !password) {
      setAuthStatus('请输入手机号和密码', 'err');
      return;
    }
    setAuthStatus('登录中...');
    try {
      const resp = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phoneNumber, password }),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data?.error || '登录失败');
      applyLoggedInState(data.user, data.token, data.quota);
      $('authPassword').value = '';
      setAuthStatus('登录成功', 'ok');
    } catch (e) {
      setAuthStatus(`登录失败：${e?.message || e}`, 'err');
    }
  }

  async function sendSmsCode() {
    setAuthModalMode('register');
    const phoneNumber = $('authPhone').value.trim();
    if (!phoneNumber) {
      setAuthStatus('请输入手机号后再发送验证码', 'err');
      return;
    }
    setAuthStatus('正在发送验证码...');
    try {
      const resp = await fetch('/api/auth/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phoneNumber }),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data?.error || '发送失败');
      registerSmsOutId = data?.outId || '';
      const interval = Number(data?.interval || 60);
      const btn = $('btnSendCode');
      btn.disabled = true;
      let remain = interval;
      btn.textContent = `${remain}s后重试`;
      const timer = setInterval(() => {
        remain -= 1;
        if (remain <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = '发送验证码';
          return;
        }
        btn.textContent = `${remain}s后重试`;
      }, 1000);
      setAuthStatus('验证码已发送，请注意查收', 'ok');
    } catch (e) {
      setAuthStatus(`发送失败：${e?.message || e}`, 'err');
    }
  }

  async function logoutAccount() {
    try {
      await fetch('/api/auth/logout', { method: 'POST' });
    } catch (e) {
      // ignore network errors on logout
    }
    applyLoggedOutState('已退出登录');
  }

  // 处理自定义输入显示/隐藏
  function setupCustomInputs() {
    // 音乐风格自定义
    $('musicStyle').addEventListener('change', function() {
      $('musicStyleCustom').style.display = this.value === 'custom' ? 'block' : 'none';
      if (this.value !== 'custom') {
        $('musicStyleCustom').value = '';
      }
    });

    // 音乐声音自定义
    $('musicVoice').addEventListener('change', function() {
      $('musicVoiceCustom').style.display = this.value === 'custom' ? 'block' : 'none';
      if (this.value !== 'custom') {
        $('musicVoiceCustom').value = '';
      }
    });

    // 绘本风格自定义
    $('pictureBookStyle').addEventListener('change', function() {
      $('pictureBookStyleCustom').style.display = this.value === 'custom' ? 'block' : 'none';
      if (this.value !== 'custom') {
        $('pictureBookStyleCustom').value = '';
      }
    });

    // 角色选择自定义
    $('characterType').addEventListener('change', function() {
      $('characterTypeCustom').style.display = this.value === 'custom' ? 'block' : 'none';
      if (this.value !== 'custom') {
        $('characterTypeCustom').value = '';
      }
    });
  }

  // 获取实际的值（处理自定义输入）
  function getActualValue(selectId, customInputId) {
    const select = $(selectId);
    const customInput = $(customInputId);
    if (select.value === 'custom' && customInput.value.trim()) {
      return customInput.value.trim();
    }
    return select.value;
  }

  // ===============
  // 全局音频播放器（单例）
  // 目标：切换步骤绝不中断；任意步骤可暂停/继续；进度与按钮状态跨步骤同步
  // ===============
  function formatTime(seconds) {
    if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  function getGlobalAudioUIRefs() {
    const idx = Number.isInteger(currentStepIndex) ? currentStepIndex : 0;
    const area = $(`stepGlobalAudioArea${idx}`);
    const playBtn = $(`stepGlobalPlayBtn${idx}`);
    const progressFill = $(`stepGlobalProgressFill${idx}`);
    const audioTime = $(`stepGlobalAudioTime${idx}`);
    const progressBar = $(`stepGlobalProgressBar${idx}`);

    return {
      area,
      playBtn,
      progressFill,
      audioTime,
      progressBar,
    };
  }

  function updateGlobalAudioUI() {
    if (!globalAudio) return;
    const { area, playBtn, progressFill, audioTime } = getGlobalAudioUIRefs();

    if (area) {
      area.style.display = globalAudioSrc ? 'block' : 'none';
    }

    if (playBtn) {
      if (globalAudio.paused) {
        playBtn.textContent = '▶';
        playBtn.classList.remove('pause');
      } else {
        playBtn.textContent = '⏸';
        playBtn.classList.add('pause');
      }
    }

    if (audioTime) {
      const cur = globalAudio.currentTime || 0;
      const dur = globalAudio.duration || 0;
      audioTime.textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
    }

    if (progressFill) {
      const dur = globalAudio.duration;
      const pct = dur && dur > 0 ? (globalAudio.currentTime / dur) * 100 : 0;
      progressFill.style.width = `${Math.max(0, Math.min(100, pct))}%`;
    }
  }

  function bindGlobalProgressBarIfNeeded() {
    const { progressBar } = getGlobalAudioUIRefs();
    if (!progressBar || progressBar.dataset.bound === '1') return;
    progressBar.dataset.bound = '1';

    const getPercentFromClientX = (clientX) => {
      const rect = progressBar.getBoundingClientRect();
      const x = clientX - rect.left;
      return Math.max(0, Math.min(100, (x / rect.width) * 100));
    };

    const setProgressPercent = (pct) => {
      if (!globalAudio || !globalAudio.duration) return;
      pct = Math.max(0, Math.min(100, pct));
      globalAudio.currentTime = (pct / 100) * globalAudio.duration;
      updateGlobalAudioUI();
    };

    let isDragging = false;

    progressBar.addEventListener('click', (e) => {
      if (isDragging) return;
      globalAudioIsSeeking = true;
      setProgressPercent(getPercentFromClientX(e.clientX));
      setTimeout(() => { globalAudioIsSeeking = false; }, 50);
    });

    progressBar.addEventListener('mousedown', (e) => {
      isDragging = true;
      globalAudioIsSeeking = true;
      setProgressPercent(getPercentFromClientX(e.clientX));

      const onMove = (ev) => {
        if (!isDragging) return;
        setProgressPercent(getPercentFromClientX(ev.clientX));
      };

      const onUp = () => {
        isDragging = false;
        globalAudioIsSeeking = false;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    progressBar.addEventListener('touchstart', (e) => {
      if (!e.touches || !e.touches[0]) return;
      isDragging = true;
      globalAudioIsSeeking = true;
      setProgressPercent(getPercentFromClientX(e.touches[0].clientX));
    }, { passive: true });

    const onTouchMove = (e) => {
      if (!isDragging || !e.touches || !e.touches[0]) return;
      setProgressPercent(getPercentFromClientX(e.touches[0].clientX));
    };

    const onTouchEnd = () => {
      if (!isDragging) return;
      isDragging = false;
      globalAudioIsSeeking = false;
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
    };

    document.addEventListener('touchmove', onTouchMove, { passive: true });
    document.addEventListener('touchend', onTouchEnd, { passive: true });
  }

  function toggleGlobalPlayPause() {
    if (!globalAudioSrc) return;
    initGlobalAudioIfNeeded();
    bindGlobalProgressBarIfNeeded();

    if (!globalAudio) return;
    if (globalAudio.paused) {
      globalAudio.play().catch(() => {});
    } else {
      globalAudio.pause();
    }
  }

  function restartGlobalAudio() {
    if (!globalAudioSrc) return;
    initGlobalAudioIfNeeded();
    bindGlobalProgressBarIfNeeded();

    if (!globalAudio) return;
    try { globalAudio.currentTime = 0; } catch (_) {}
    globalAudio.play().catch(() => {});
  }

  function initGlobalAudioIfNeeded() {
    if (!globalAudio) {
      globalAudio = document.createElement('audio');
      globalAudio.id = 'globalAudio';
      globalAudio.className = 'audio-hidden';
      globalAudio.style.display = 'none';
      document.body.appendChild(globalAudio);
    }

    if (!globalAudioBindingsReady) {
      globalAudioBindingsReady = true;

      globalAudio.addEventListener('timeupdate', () => {
        if (globalAudioIsSeeking) return;
        updateGlobalAudioUI();
      });

      globalAudio.addEventListener('loadedmetadata', () => {
        bindGlobalProgressBarIfNeeded();
        updateGlobalAudioUI();
        if (globalAudioPendingAutoplay) {
          globalAudioPendingAutoplay = false;
          globalAudio.play().catch(() => {});
        }
      });

      globalAudio.addEventListener('play', updateGlobalAudioUI);
      globalAudio.addEventListener('pause', updateGlobalAudioUI);
      globalAudio.addEventListener('ended', updateGlobalAudioUI);
    }
  }

  function ensureGlobalAudioSource(url) {
    if (!url) return;
    initGlobalAudioIfNeeded();

    if (globalAudioSrc !== url) {
      const wasPlaying = globalAudio && !globalAudio.paused;

      globalAudioSrc = url;
      globalAudio.src = url;

      if (wasPlaying) {
        globalAudio.play().catch(() => {});
      }
    }
  }

  function clearGlobalAudioSource() {
    if (!globalAudio) return;
    try { globalAudio.pause(); } catch (_) {}
    globalAudioSrc = '';
    try {
      globalAudio.removeAttribute('src');
      globalAudio.load();
    } catch (_) {}
    updateGlobalAudioUI();
  }

  // 分解用户目标
  async function decomposeGoal() {
    if (!currentUser) {
      setAuthStatus('请先登录再开始生成', 'err');
      return;
    }
    const userGoal = $('userGoal').value.trim();
    const learningFocus = $('learningFocus').value.trim();
    const musicStyle = getActualValue('musicStyle', 'musicStyleCustom');
    const musicVoice = getActualValue('musicVoice', 'musicVoiceCustom');
    const pictureBookStyle = getActualValue('pictureBookStyle', 'pictureBookStyleCustom');
    const characterType = getActualValue('characterType', 'characterTypeCustom');
    const decomposeStatusEl = $('decomposeStatus');

    if (!userGoal) {
      decomposeStatusEl.className = 'err';
      decomposeStatusEl.textContent = '请输入学习目标';
      return;
    }

    decomposeStatusEl.className = 'muted';
    decomposeStatusEl.innerHTML = '<span class="loading"></span> 正在分解...';
    $('btnDecompose').disabled = true;
    isDecomposing = true;

    // 显示积木拼接动画
    const buildingAnim = $('buildingAnimation');
    const buildingStatus = $('buildingStatus');
    buildingAnim.style.display = 'flex';
    buildingStatus.textContent = '正在分析学习目标...';

    try {
      setTimeout(() => {
        buildingStatus.textContent = '正在分解学习步骤...';
      }, 1000);

      const characterName = $('characterName').value.trim() || '乐乐';

      const resp = await fetch('/api/decompose-prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userGoal,
          learningFocus,
          musicStyle,
          musicVoice,
          pictureBookStyle,
          characterType,
          characterName
        }),
      }).catch(err => {
        throw new Error(`网络请求失败: ${err.message || '无法连接到服务器，请确保服务器正在运行'}`);
      });

      if (resp.status === 401) {
        isDecomposing = false;
        applyLoggedOutState('登录已过期，请重新登录');
        return;
      }

      const data = await resp.json().catch(() => {
        return { error: '服务器返回了无效的响应格式' };
      });

      if (!resp.ok) {
        throw new Error(data?.error || `HTTP ${resp.status}: ${resp.statusText}`);
      }

      decomposedData = data.result;

      // 验证步骤数量
      if (!decomposedData || !decomposedData.steps || !Array.isArray(decomposedData.steps) || decomposedData.steps.length === 0) {
        throw new Error('分解结果无效：未包含学习步骤');
      }
      if (decomposedData.steps.length !== 4) {
        throw new Error(`分解结果包含${decomposedData.steps.length}个步骤（需要正好4个），请重试`);
      }

      currentStepIndex = 0;
      stepContents = [];
      currentSessionId = null;

      buildingStatus.textContent = '正在构建学习方案...';

      if (decomposedData.character_name) {
        $('characterName').value = decomposedData.character_name;
      }

      if (decomposedData.character_name || decomposedData.character_description || decomposedData.character_sheet) {
        $('characterInfo').style.display = 'block';

        const characterName = $('characterName').value.trim() || decomposedData.character_name || '乐乐';
        const cs = decomposedData.character_sheet;
        const csText = cs && cs.reference_prompt ? cs.reference_prompt : '';

        $('characterDetails').innerHTML = `
          <div><strong>角色：</strong>${characterName}</div>
          <div style="margin-top: 4px;"><strong>描述：</strong>${decomposedData.character_description || '可爱的学习伙伴'}</div>
          ${csText ? `<div style="margin-top: 8px;"><strong>设定卡：</strong>${csText}</div>` : ''}
        `;
      }

      buildingStatus.textContent = '完成！进入学习步骤...';

      setTimeout(() => {
        buildingAnim.style.display = 'none';

        $('stepsSection').style.display = 'block';
        $('welcomeMessage').style.display = 'none';
        $('stepsContainer').style.display = 'block';

        renderStepIndicator();
        renderStepContents();
        showCurrentStep();
        updateNavigationButtons();

        setTimeout(() => {
          generateAllSteps();
        }, 1000);
      }, 800);

      decomposeStatusEl.className = 'ok';
      decomposeStatusEl.textContent = '✅ 分解完成！正在生成图片和音乐...';
    } catch (e) {
      console.error('Decompose error:', e);
      buildingAnim.style.display = 'none';
      decomposeStatusEl.className = 'err';
      const errorMsg = e?.message || String(e) || '未知错误';
      decomposeStatusEl.textContent = '分解失败：' + errorMsg;

      if (errorMsg.includes('Failed to fetch') || errorMsg.includes('网络请求失败')) {
        decomposeStatusEl.textContent = '分解失败：无法连接到服务器。请确保服务器正在运行（node server.js）';
      }
    } finally {
      isDecomposing = false;
      $('btnDecompose').disabled = false;
    }
  }

  function renderStepIndicator() {
    const indicatorEl = $('stepIndicator');
    indicatorEl.innerHTML = '';
    
    decomposedData.steps.forEach((step, index) => {
      const stepName = String(step?.step_name || `步骤${index + 1}`).trim();
      const shortName = stepName.length > 8 ? `${stepName.slice(0, 8)}...` : stepName;
      const dot = document.createElement('div');
      dot.className = 'step-dot';
      dot.innerHTML = `
        <span class="step-dot-num">${index + 1}</span>
        <span class="step-dot-label">${shortName}</span>
      `;
      dot.title = `步骤 ${index + 1}：${stepName}`;
      dot.id = `stepDot${index}`;
      indicatorEl.appendChild(dot);
    });
  }

  function renderStepContents() {
    const containerEl = $('stepsContainer');
    containerEl.innerHTML = '';

    decomposedData.steps.forEach((step, index) => {
      const stepEl = document.createElement('div');
      stepEl.className = 'step-content';
      stepEl.id = `stepContent${index}`;
      
      stepEl.innerHTML = `
        <div class="step-header">
          <h2 style="margin: 0;">步骤 ${step.step_number || (index + 1)}：${step.step_name}</h2>
          <div class="step-info">
            <div><strong>描述：</strong>${step.step_description}</div>
            <div style="margin-top: 8px;"><strong>学习目标：</strong>${step.learning_objective}</div>
          </div>
        </div>
        
        <div id="stepResult${index}" class="content-grid">
          <div class="content-box" style="width: 100%; max-width: 900px;">
            <div id="stepImage${index}" class="image-box" style="text-align: center; color: var(--muted);">
              等待生成...
            </div>

            <div id="stepGlobalAudioArea${index}" class="global-audio-area" style="display: none;">
              <div class="global-audio-title">🎵 音乐播放</div>
              <div class="global-audio-controls">
                <button id="stepGlobalPlayBtn${index}" class="audio-control-btn play-btn" onclick="toggleGlobalPlayPause()">▶</button>
                <button id="stepGlobalRestartBtn${index}" class="audio-control-btn restart" onclick="restartGlobalAudio()">⏮</button>
                <div class="audio-progress-container">
                  <div class="audio-progress-bar" id="stepGlobalProgressBar${index}">
                    <div class="audio-progress-fill" id="stepGlobalProgressFill${index}" style="width: 0%;">
                      <div class="audio-progress-thumb"></div>
                    </div>
                  </div>
                  <div class="audio-time" id="stepGlobalAudioTime${index}">0:00 / 0:00</div>
                </div>
              </div>
            </div>
            
            <div id="stepLyrics${index}" class="lyrics-box" style="display: none;">等待生成...</div>
          </div>
        </div>
        
        <div class="content-box" style="margin-top: 20px; min-height: 80px; padding: 16px; position: relative;">
          <h3 style="margin: 0 0 12px 0; font-size: 18px;">🎵 音乐选项</h3>
          <div class="audio-box" style="text-align: center; color: var(--muted);">
            <div id="stepAudio${index}" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px;">
            等待生成...
          </div>
            <div class="download-buttons-container" id="downloadButtonsContainer${index}" style="display: none;">
              <button class="download-btn download-btn-lyrics" id="downloadLyricsBtn${index}" onclick="downloadLyrics(${index})" title="下载歌词">↓</button>
              <button class="download-btn download-btn-image" id="downloadImageBtn${index}" onclick="downloadImage(${index})" title="下载图片">↓</button>
              <button class="download-btn download-btn-audio" id="downloadAudioBtn${index}" onclick="downloadAudio(${index})" title="下载音频">↓</button>
              <button class="download-btn download-btn-all" id="downloadAllBtn${index}" onclick="downloadAllStepContent(${index})" title="下载全部">↓</button>
            </div>
          </div>
        </div>
      `;
      
      containerEl.appendChild(stepEl);
    });
  }

  const imagePreloadCache = new Map();

  function preloadImage(url) {
    if (!url) return Promise.resolve(false);
    if (imagePreloadCache.has(url)) return imagePreloadCache.get(url);

    const p = new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = url;
    });

    imagePreloadCache.set(url, p);
    return p;
  }

  function showCurrentStep() {
    const totalSteps = decomposedData?.steps?.length || 0;
    if (!totalSteps) return;

    const content = stepContents[currentStepIndex];
    if (content?.imageUrl) preloadImage(content.imageUrl);

    const nextIndex = (currentStepIndex + 1) % totalSteps;
    const nextContent = stepContents[nextIndex];
    if (nextContent?.imageUrl) preloadImage(nextContent.imageUrl);

    decomposedData.steps.forEach((step, index) => {
      const stepEl = $(`stepContent${index}`);
      if (stepEl) stepEl.classList.remove('active');
      
      const dotEl = $(`stepDot${index}`);
      if (dotEl) {
        dotEl.classList.remove('active', 'completed');
        if (index === currentStepIndex) {
          dotEl.classList.add('active');
        } else if (isContentFullyGenerated(stepContents[index])) {
          dotEl.classList.add('completed');
        }
      }
    });
    
    const currentStepEl = $(`stepContent${currentStepIndex}`);
    if (currentStepEl) {
      currentStepEl.classList.add('active');
      
      if (stepContents[currentStepIndex]) {
        displayStepContent(currentStepIndex);
      } else {
        const downloadAllBtn = $(`downloadAllBtn${currentStepIndex}`);
        if (downloadAllBtn) downloadAllBtn.style.display = 'none';
      }
    }
    bindGlobalProgressBarIfNeeded();
    updateGlobalAudioUI();
  }

  function cleanLyrics(lyrics) {
    if (!lyrics) return '';
    lyrics = lyrics.replace(/\[Suno Style:.*?\]/gi, '');
    lyrics = lyrics.replace(/\[Intro\].*?(\[Verse\]|\[Chorus\])/gis, '$1');
    lyrics = lyrics.replace(/\[Outro\].*?$/gis, '');
    lyrics = lyrics.replace(/\[Bridge\].*?(\[Verse\]|\[Chorus\])/gis, '$1');
    lyrics = lyrics.replace(/\(BPM\s+\d+\)/gi, '');
    lyrics = lyrics.replace(/Tempo:.*/gi, '');
    lyrics = lyrics.replace(/节奏:.*/gi, '');
    lyrics = lyrics.replace(/\n{3,}/g, '\n\n');
    lyrics = lyrics.trim();
    return lyrics;
  }

  function getMiniBuildingAnimationHTML() {
    return `
      <div style="display:flex;gap:6px;align-items:flex-end;animation:pulse 1s infinite alternate;">
        <div style="width:20px;height:20px;background:var(--brand);border-radius:6px;"></div>
        <div style="width:20px;height:30px;background:var(--brand-2);border-radius:6px;"></div>
        <div style="width:20px;height:40px;background:var(--brand-3);border-radius:6px;"></div>
        <div style="width:20px;height:20px;background:var(--brand-4);border-radius:6px;"></div>
      </div>
      <style>@keyframes pulse { from { opacity: 0.5; } to { opacity: 1; transform: translateY(-5px); } }</style>
    `;
  }
  
  function isContentFullyGenerated(content) {
    if (!content) return false;
    const hasLyrics = content.lyrics || content.lyricsError;
    const hasImage = content.imageUrl || content.imageError;
    const hasAudio = content.audioUrl || content.audioError;
    return hasLyrics && hasImage && hasAudio;
  }

  function displayStepContent(stepIndex) {
    const content = stepContents[stepIndex];
    const lyricsEl = $(`stepLyrics${stepIndex}`);
    const imageEl = $(`stepImage${stepIndex}`);
    const audioEl = $(`stepAudio${stepIndex}`);
    const stepGlobalAudioAreaEl = $(`stepGlobalAudioArea${stepIndex}`);
    
    const isFullyGenerated = isContentFullyGenerated(content);
    
    if (!content || !isFullyGenerated) {
      if (imageEl) {
        imageEl.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${getMiniBuildingAnimationHTML()}</div>`;
      }
      if (lyricsEl) lyricsEl.style.display = 'none';
      if (audioEl) audioEl.innerHTML = '';
      if (stepGlobalAudioAreaEl) stepGlobalAudioAreaEl.style.display = 'none';
      return;
    }

    if (lyricsEl) {
      if (content.lyrics) {
        const cleanedLyrics = cleanLyrics(content.lyrics);
        lyricsEl.textContent = cleanedLyrics;
        lyricsEl.style.display = 'block'; 
      } else if (content.lyricsError) {
        lyricsEl.textContent = `歌词生成失败：${content.lyricsError}`;
        lyricsEl.style.color = 'var(--brand-shadow)';
        lyricsEl.style.display = 'block';
      } else {
        lyricsEl.style.display = 'none';
      }
    }

    if (imageEl) {
      if (content.imageUrl) {
        imageEl.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${getMiniBuildingAnimationHTML()}</div>`;
        const img = new Image();
        img.onload = () => {
          imageEl.innerHTML = `<img src="${content.imageUrl}" alt="步骤 ${stepIndex + 1} 图片" />`;
        };
        img.onerror = () => {
          imageEl.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--brand-shadow); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">图片加载失败</div>`;
        };
        img.src = content.imageUrl;
      } else if (content.imageError) {
        imageEl.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--brand-shadow); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">图片生成失败：${content.imageError}</div>`;
      } else {
        imageEl.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--muted); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">等待生成...</div>';
      }
    }

    if (audioEl) {
      if (content.audioDeleted) {
        audioEl.innerHTML = `<div style="text-align: center; font-weight: 800; color: var(--brand-shadow);">音乐已删除</div>`;
      } else if (content.audioUrl) {
        audioEl.innerHTML = `<div style="text-align: center; font-weight: 800; color: var(--brand-4-shadow);">✨ 音乐已生成</div>`;
      } else if (content.audioError) {
        audioEl.innerHTML = `<div style="text-align: center; font-weight: 800; color: var(--brand-shadow);">音乐生成失败：${content.audioError}</div>`;
      } else {
        audioEl.innerHTML = '';
      }
    }

    if (stepGlobalAudioAreaEl) {
      if (!content.audioDeleted && !!content.audioUrl) {
        stepGlobalAudioAreaEl.style.display = 'block';
      } else {
        stepGlobalAudioAreaEl.style.display = 'none';
      }
    }
    
    updateDownloadButtons(stepIndex, content);

    if (stepIndex === currentStepIndex) {
      bindGlobalProgressBarIfNeeded();
      updateGlobalAudioUI();
    }
  }

  function updateDownloadButtons(stepIndex, content) {
    const downloadContainer = $(`downloadButtonsContainer${stepIndex}`);
    if (!downloadContainer) return;
    
    const hasLyrics = content?.lyrics && !content?.lyricsError;
    const hasImage = content?.imageUrl && !content?.imageError;
    const hasAudio = content?.audioUrl && !content?.audioError;
    const hasAnyContent = hasLyrics || hasImage || hasAudio;
    
    if (hasAnyContent) {
      downloadContainer.style.display = 'flex';
      
      const lyricsBtn = $(`downloadLyricsBtn${stepIndex}`);
      const imageBtn = $(`downloadImageBtn${stepIndex}`);
      const audioBtn = $(`downloadAudioBtn${stepIndex}`);
      const allBtn = $(`downloadAllBtn${stepIndex}`);
      
      if (lyricsBtn) { lyricsBtn.disabled = !hasLyrics; lyricsBtn.style.display = 'flex'; }
      if (imageBtn) { imageBtn.disabled = !hasImage; imageBtn.style.display = 'flex'; }
      if (audioBtn) { audioBtn.disabled = !hasAudio; audioBtn.style.display = 'flex'; }
      if (allBtn) {
        allBtn.disabled = !(hasLyrics && hasImage && hasAudio);
        allBtn.style.display = 'flex';
      }
    } else {
      downloadContainer.style.display = 'flex';
      
      const lyricsBtn = $(`downloadLyricsBtn${stepIndex}`);
      const imageBtn = $(`downloadImageBtn${stepIndex}`);
      const audioBtn = $(`downloadAudioBtn${stepIndex}`);
      const allBtn = $(`downloadAllBtn${stepIndex}`);
      
      if (lyricsBtn) { lyricsBtn.disabled = true; lyricsBtn.style.display = 'flex'; }
      if (imageBtn) { imageBtn.disabled = true; imageBtn.style.display = 'flex'; }
      if (audioBtn) { audioBtn.disabled = true; audioBtn.style.display = 'flex'; }
      if (allBtn) { allBtn.disabled = true; allBtn.style.display = 'flex'; }
    }
  }

  function updateNavigationButtons() {
    if (!decomposedData || !decomposedData.steps || !decomposedData.steps.length) {
      $('btnPrev').disabled = true;
      $('btnNext').disabled = true;
      $('btnRegenerate').disabled = true;
      $('btnDeleteMusic').disabled = true;
      return;
    }
    const totalSteps = decomposedData.steps.length;
    const canLoopNavigate = !!currentUser && totalSteps > 1;
    $('btnPrev').disabled = !canLoopNavigate;
    $('btnNext').disabled = !canLoopNavigate;
    $('btnRegenerate').disabled = !currentUser || !stepContents[currentStepIndex];
    const hasAudio = !!stepContents.find((item) => item && item.audioUrl && !item.audioDeleted);
    $('btnDeleteMusic').disabled = !currentUser || !currentSessionId || !hasAudio;
  }

  function goToPrevStep() {
    if (!decomposedData || !decomposedData.steps || !decomposedData.steps.length) return;
    const totalSteps = decomposedData.steps.length;
    if (totalSteps <= 1) return;
    currentStepIndex = (currentStepIndex - 1 + totalSteps) % totalSteps;
    showCurrentStep();
    updateNavigationButtons();
  }

  function goToNextStep() {
    if (!decomposedData || !decomposedData.steps || !decomposedData.steps.length) return;
    const totalSteps = decomposedData.steps.length;
    if (totalSteps <= 1) return;
    currentStepIndex = (currentStepIndex + 1) % totalSteps;
    showCurrentStep();
    updateNavigationButtons();
  }

  async function regenerateCurrentStep() {
    if (!currentUser) { setAuthStatus('请先登录', 'err'); return; }
    if (isGeneratingAll) { alert('正在生成所有内容，请稍候...'); return; }
    if (!decomposedData || !decomposedData.steps || decomposedData.steps.length !== 4) {
      alert('请先分解学习目标（必须正好4个步骤）'); return;
    }

    const statusEl = $('generateStatus');
    statusEl.className = 'muted';
    statusEl.textContent = '正在重新生成所有内容（完整歌曲和组合图片）...';
    $('btnRegenerate').disabled = true;

    try {
      for (let i = 0; i < 4; i++) { stepContents[i] = null; }
      await generateAllSteps();
      statusEl.className = 'ok';
      statusEl.textContent = '✅ 所有内容重新生成完成！';
    } catch (e) {
      statusEl.className = 'err';
      statusEl.textContent = `❌ 生成失败：${e?.message || e}`;
    } finally {
      $('btnRegenerate').disabled = false;
      updateNavigationButtons();
    }
  }

  async function generateAllSteps() {
    if (!currentUser) { setAuthStatus('请先登录', 'err'); return; }
    if (!decomposedData || !decomposedData.steps || decomposedData.steps.length === 0) {
      $('decomposeStatus').className = 'err';
      $('decomposeStatus').textContent = '请先分解学习目标';
      return;
    }
    if (decomposedData.steps.length !== 4) {
      $('decomposeStatus').className = 'err';
      $('decomposeStatus').textContent = `分解结果包含${decomposedData.steps.length}个步骤（需要正好4个），请重新分解`;
      return;
    }
    if (isGeneratingAll) return;

    isGeneratingAll = true;
    const statusEl = $('generateStatus');
    const decomposeStatusEl = $('decomposeStatus');
    statusEl.className = 'muted';
    statusEl.textContent = '正在生成完整歌曲和组合图片，请稍候...';
    decomposeStatusEl.className = 'ok';
    decomposeStatusEl.textContent = '✅ 分解完成！正在生成图片和音乐...';
    $('btnGenerateAll').style.display = 'none';
    $('btnRegenerate').disabled = true;
    $('btnPrev').disabled = true;
    $('btnNext').disabled = true;

    try {
      const characterName = $('characterName').value.trim() || decomposedData.character_name || '乐乐';
      const musicStyle = getActualValue('musicStyle', 'musicStyleCustom');
      const musicVoice = getActualValue('musicVoice', 'musicVoiceCustom');
      const pictureBookStyle = getActualValue('pictureBookStyle', 'pictureBookStyleCustom');
      const characterType = getActualValue('characterType', 'characterTypeCustom');
      const characterDescription = decomposedData.character_description || '';
      const characterSheet = decomposedData.character_sheet || null;

      for (let i = 0; i < 4; i++) {
        stepContents[i] = {};
        if (currentStepIndex === i) { displayStepContent(i); }
      }

      // ---- 生成歌词 ----
      statusEl.textContent = '正在生成完整歌曲歌词...';

      const lyricsResp = await fetch('/api/generate-complete-song', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ steps: decomposedData.steps, characterName, musicStyle, musicVoice }),
      });

      // 检查 401 并给出明确提示
      if (lyricsResp.status === 401) {
        isGeneratingAll = false;
        applyLoggedOutState('登录已过期，请重新登录后再试');
        return;
      }

      const lyricsData = await lyricsResp.json().catch(() => ({}));
      if (!lyricsResp.ok) {
        if (lyricsData?.code === 'DAILY_LIMIT_EXCEEDED') await refreshQuota();
        throw new Error(lyricsData?.error || '完整歌曲歌词生成失败');
      }

      if (lyricsData?.quota) {
        const q = lyricsData.quota;
        $('quotaInfo').textContent = `今日剩余：${q.remaining ?? '-'} / ${q.limit ?? '-'}（重置：${q.resetAt ? new Date(q.resetAt).toLocaleString('zh-CN') : '-'}）`;
      }

      const stepsLyrics = Array.isArray(lyricsData.steps_lyrics) ? lyricsData.steps_lyrics : null;
      const fullLyrics = typeof lyricsData.full_lyrics === 'string' ? lyricsData.full_lyrics : '';
      if (!stepsLyrics || stepsLyrics.length !== 4 || !fullLyrics) {
        throw new Error('完整歌曲歌词返回格式错误：需要 steps_lyrics(长度4) 和 full_lyrics');
      }

      // ---- 生成图片 ----
      statusEl.textContent = '正在生成组合图片（包含4个小图）...';

      const combinedImageResp = await fetch('/api/generate-combined-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          steps: decomposedData.steps, characterName, characterDescription, characterSheet, pictureBookStyle
        }),
      });

      if (combinedImageResp.status === 401) {
        isGeneratingAll = false;
        applyLoggedOutState('登录已过期，请重新登录后再试');
        return;
      }

      const combinedImageData = await combinedImageResp.json().catch(() => ({}));
      if (!combinedImageResp.ok) throw new Error(combinedImageData?.error || '组合图片生成失败');

      const combinedImageUrl = combinedImageData.image_url;
      if (!combinedImageUrl) throw new Error('未返回组合图片URL');

      statusEl.textContent = '正在裁剪图片（从大图中提取4个小图）...';

      const croppedImages = await cropCombinedImage(combinedImageUrl);
      if (!croppedImages || croppedImages.length !== 4) throw new Error('图片裁剪失败：未能成功提取4个小图');

      // ---- 生成音乐 ----
      statusEl.textContent = '正在生成完整歌曲音乐...';

      const joined = stepsLyrics.join('\n');
      if (joined !== fullLyrics) {
        throw new Error('歌词一致性校验失败：full_lyrics 与 steps_lyrics 拼接结果不一致');
      }

      let audioUrl = null;
      let audioError = null;
      try {
        audioUrl = await generateCompleteSongMusic(fullLyrics, decomposedData.steps[0].step_name, musicStyle, musicVoice);
      } catch (e) {
        audioError = e?.message || e;
        console.warn('音乐生成失败（非致命）：', audioError);
      }

      if (audioUrl) ensureGlobalAudioSource(audioUrl);

      for (let i = 0; i < 4; i++) {

          lyrics: stepsLyrics[i],
          imageUrl: croppedImages[i],
          audioUrl: audioUrl,
          audioDeleted: false,
          imageError: null,
          audioError: audioError,
        };

        if (currentStepIndex === i) displayStepContent(i);
        try { await saveStepContent(i); } catch (e) { }
      }

      statusEl.className = 'ok';
      statusEl.textContent = '✅ 所有内容生成完成！已生成一首完整歌曲和4个小图';
      decomposeStatusEl.className = 'ok';
      decomposeStatusEl.textContent = '✅ 分解并生成完成！';

      try { await saveHistory(); } catch (e) { }

      statusEl.className = 'err';

    }
  }

  function cleanLyricsForMusic(lyrics) {
    if (!lyrics) return '';
    let cleaned = lyrics.replace(/\[Duration:.*?\]/gi, '').trim();
    cleaned = cleaned.replace(/Make this song.*?seconds.*?\n/gi, '').trim();
    cleaned = cleaned.replace(/The song must be brief.*?\n/gi, '').trim();
    cleaned = cleaned.replace(/Keep it short and simple.*?\n/gi, '').trim();
    cleaned = cleaned.replace(/no longer than.*?\n/gi, '').trim();
    cleaned = cleaned.replace(/exactly.*?seconds.*?\n/gi, '').trim();
    cleaned = cleaned.replace(/\n{3,}/g, '\n\n').trim();
    return cleaned;
  }

  async function cropCombinedImage(imageUrl) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous'; 
      img.onload = function() {
        try {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const croppedImages = [];
          
          canvas.width = 832;
          canvas.height = 464;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, 832, 464);
          ctx.drawImage(img, 0, 0, 832, 464, 0, 0, 832, 464);
          croppedImages.push(canvas.toDataURL('image/png'));
          
          ctx.clearRect(0, 0, 832, 464);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, 832, 464);
          ctx.drawImage(img, 832, 0, 832, 464, 0, 0, 832, 464);
          croppedImages.push(canvas.toDataURL('image/png'));
          
          ctx.clearRect(0, 0, 832, 464);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, 832, 464);
          ctx.drawImage(img, 0, 464, 832, 464, 0, 0, 832, 464);
          croppedImages.push(canvas.toDataURL('image/png'));
          
          ctx.clearRect(0, 0, 832, 464);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, 832, 464);
          ctx.drawImage(img, 832, 464, 832, 464, 0, 0, 832, 464);
          croppedImages.push(canvas.toDataURL('image/png'));
          
          resolve(croppedImages);
        } catch (e) {
          reject(new Error('图片裁剪失败：' + (e?.message || e)));
        }
      };
      img.onerror = function() { reject(new Error('图片加载失败，无法裁剪')); };
      img.src = imageUrl;
    });
  }

  async function generateCompleteSongMusic(lyrics, title, musicStyle, musicVoice) {
    const cleanLyrics = cleanLyricsForMusic(lyrics);
    musicStyle = musicStyle || '欢快';
    musicVoice = musicVoice || '男生';

    const styleMap = {
      '欢快':    { genre: 'Pop',           mood: 'Happy' },
      '舒缓钢琴': { genre: 'Easy Listening', mood: 'Calm/Relaxing' },
      '活泼儿歌': { genre: 'Pop',            mood: 'Dynamic/Energetic' },
      '节奏感强': { genre: 'Pop Rock',       mood: 'Dynamic/Energetic' },
      '温馨童谣': { genre: 'Folk',           mood: 'Warm/Kind' },
    };
    const styleParams = styleMap[musicStyle] || { genre: 'Pop', mood: 'Happy' };
    const gender = musicVoice.includes('女') ? 'Female' : musicVoice.includes('男') ? 'Male' : '';

    const payload = {
      lyrics: cleanLyrics,
      genre: styleParams.genre,
      mood: styleParams.mood,
      duration: 60,
    };
    if (gender) payload.gender = gender;

    const submitResp = await fetch('/api/music-submit', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!submitResp.ok) throw new Error(`submit failed: ${submitResp.status}`);
    const submitData = await submitResp.json();
    const taskId = extractTaskId(submitData);

    if (!taskId) {
      const directUrl = pickFirstAudioUrl(submitData);
      if (directUrl) return directUrl;
      throw new Error('未拿到任务 id');
    }

    let i = 0;
    while (i < 40) { 
      await sleep(5000);
      const r = await fetchTask(taskId);
      const statusText = extractTaskStatus(r);
      const st = String(statusText).toLowerCase();

      if (st && ['failed','error','canceled','cancelled','fail'].includes(st)) {
        throw new Error('任务失败: ' + statusText);
      }
      const url = pickFirstAudioUrl(r);
      if (url) return url;
      i++;
    }
    throw new Error('轮询超时：还未拿到 audio_url');
  }

  async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  async function fetchTask(id) {
    const res = await fetch('/api/music-fetch?id=' + encodeURIComponent(id));
    if (!res.ok) throw new Error(`fetch failed`);
    return await res.json();
  }

  function pickFirstAudioUrl(resp) {
    // Doubao: { Code: 0, Result: { SongDetail: { AudioUrl: "..." } } }
    if (resp?.Result?.SongDetail?.AudioUrl) return resp.Result.SongDetail.AudioUrl;
    // Suno/defapi.org: { data: [{ audio_url: "..." }] }
    if (Array.isArray(resp?.data)) {
      for (const item of resp.data) if (item?.audio_url) return item.audio_url;
    }
    const resultArray = resp?.data?.result;
    if (Array.isArray(resultArray)) {
      for (const item of resultArray) if (item?.audio_url) return item.audio_url;
    }
    const dataArray = resp?.data?.data;
    if (Array.isArray(dataArray)) {
      for (const item of dataArray) if (item?.audio_url) return item.audio_url;
    }
    const candidates = [resp, resp?.Result, resp?.data, resp?.data?.data, resp?.data?.data?.data];
    for (const obj of candidates) {
      if (Array.isArray(obj)) continue;
      const clips = obj?.clips;
      if (Array.isArray(clips)) {
        for (const c of clips) if (c?.audio_url) return c.audio_url;
      }
      if (obj?.OutputURL) return obj.OutputURL;
      if (obj?.AudioURL) return obj.AudioURL;
      if (obj?.audioUrl) return obj.audioUrl;
      if (obj?.audio_url) return obj.audio_url;
    }
    const deepUrl = deepFindByKeys(resp, ['audio_url', 'audioUrl', 'AudioURL', 'OutputURL', 'output_url', 'url']);
    if (typeof deepUrl === 'string' && /^https?:\/\//i.test(deepUrl)) return deepUrl;
    return '';
  }

  function extractTaskId(resp) {
    // Suno/defapi.org 可能返回 { data: "task_id" } 纯字符串
    if (typeof resp?.data === 'string' && resp.data.trim()) return resp.data.trim();
    // Suno/defapi.org 可能返回 { data: [{ id: "xxx" }] } 数组
    if (Array.isArray(resp?.data) && resp.data.length > 0) {
      const first = resp.data[0];
      const arrId = first?.id || first?.task_id || first?.taskId;
      if (typeof arrId === 'string' && arrId.trim()) return arrId.trim();
    }
    const direct =
      resp?.data?.taskId ||
      resp?.data?.task_id ||
      resp?.Result?.TaskID ||
      resp?.Result?.TaskId ||
      resp?.TaskID ||
      resp?.taskId ||
      resp?.id;
    if (typeof direct === 'string' && direct.trim()) return direct.trim();
    const deep = deepFindByKeys(resp, ['TaskID', 'TaskId', 'taskId', 'task_id', 'id']);
    return (typeof deep === 'string' && deep.trim()) ? deep.trim() : '';
  }

  function extractTaskStatus(resp) {
    if (Array.isArray(resp)) return 'success';
    // Doubao: numeric Status  0=waiting 1=processing 2=success 3=failed
    if (resp?.Result && typeof resp.Result.Status === 'number') {
      const ds = resp.Result.Status;
      if (ds === 2) return 'success';
      if (ds === 3) return 'failed';
      return 'running';
    }
    // Doubao: top-level Code non-zero means error
    if (typeof resp?.Code === 'number' && resp.Code !== 0) return 'failed';
    // Suno/defapi.org: { data: [{ status: "complete" }] }
    const dataFirst = Array.isArray(resp?.data) && resp.data.length > 0 ? resp.data[0] : null;
    const raw =
      dataFirst?.status ||
      resp?.data?.status ||
      resp?.status ||
      resp?.Result?.Status ||
      resp?.Result?.TaskStatus ||
      deepFindByKeys(resp, ['status', 'Status', 'TaskStatus', 'task_status', 'state', 'State']) ||
      '';
    const s = String(raw).toLowerCase();
    if (!s) return '';
    if (['succeeded', 'finished', 'done', 'completed', 'complete'].includes(s)) return 'success';
    if (['failed', 'error', 'cancelled', 'canceled'].includes(s)) return 'failed';
    return s;
  }

  function deepFindByKeys(obj, keys) {
    const target = new Set(keys.map(k => String(k).toLowerCase()));
    const stack = [obj];
    while (stack.length) {
      const current = stack.pop();
      if (!current || typeof current !== 'object') continue;
      if (Array.isArray(current)) {
        for (const item of current) stack.push(item);
        continue;
      }
      for (const [k, v] of Object.entries(current)) {
        if (target.has(String(k).toLowerCase()) && (typeof v === 'string' || typeof v === 'number')) {
          return v;
        }
        if (v && typeof v === 'object') stack.push(v);
      }
    }
    return '';
  }

  function togglePlayPause(stepIndex) {
    const content = stepContents?.[stepIndex];
    if (!content?.audioUrl) {

      return;

    const content = stepContents?.[stepIndex];
    if (!content?.audioUrl) {
      globalAudioPendingAutoplay = true;
      return;
    }
    ensureGlobalAudioSource(content.audioUrl);
    if (!globalAudio) return;
    try { globalAudio.currentTime = 0; } catch (_) {}
    globalAudio.play().catch(() => {});

  function seekAudio(stepIndex, event) {
    const progressBar = document.getElementById(`progressBar${stepIndex}`);
    const content = stepContents?.[stepIndex];
    if (!progressBar || !content?.audioUrl) return;

    ensureGlobalAudioSource(content.audioUrl);
    if (!globalAudio || !globalAudio.duration) return;

    const rect = progressBar.getBoundingClientRect();
    const clickX = event.clientX - rect.left;
    const percent = (clickX / rect.width) * 100;
    globalAudio.currentTime = (percent / 100) * globalAudio.duration;
    updateGlobalAudioUI();
  }

  async function downloadFile(url, filename, mimeType) {
    try {
      if ('showDirectoryPicker' in window) {
        const dirHandle = await window.showDirectoryPicker();
        const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
        const writable = await fileHandle.createWritable();
        const response = await fetch(url);
        const blob = await response.blob();
        await writable.write(blob);
        await writable.close();
        return true;
      } else {
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
        return true;
      }
    } catch (error) {
      if (error.name !== 'AbortError') {
        try {
          const response = await fetch(url);
          const blob = await response.blob();
          const blobUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = blobUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(blobUrl);
          return true;
        } catch (e) {
          alert('下载失败：' + (e.message || e));
          return false;
        }
      }
      return false;
    }
  }
