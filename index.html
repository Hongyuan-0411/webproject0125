  async function saveHistory() {
    if (!decomposedData || !stepContents || !currentSessionId) return;
    const allStepsComplete = decomposedData.steps.every((step, index) => {
      const content = stepContents[index];
      if (!content) return false;
      const hasLyrics = content.lyrics || content.lyricsError;
      const hasImage = content.imageUrl || content.imageError;
      const hasAudio = content.audioUrl || content.audioError;
      return hasLyrics && hasImage && hasAudio;
    });

    if (!allStepsComplete) return;

    try {
      const userGoal = $('userGoal').value.trim();
      const learningFocus = $('learningFocus').value.trim();
      const musicStyle = getActualValue('musicStyle', 'musicStyleCustom');
      const musicVoice = getActualValue('musicVoice', 'musicVoiceCustom');
      const pictureBookStyle = getActualValue('pictureBookStyle', 'pictureBookStyleCustom');
      const characterType = getActualValue('characterType', 'characterTypeCustom');

      const enhancedStepContents = stepContents.map((content, index) => ({
        ...content,
        ...(index === 0 ? {
          steps_lyrics: stepContents.map(c => c.lyrics),
          full_lyrics: stepContents.map(c => c.lyrics).join('\n')
        } : {})
      }));

      const resp = await fetch('/api/save-history', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId: currentSessionId,
          decomposedData: decomposedData,
          stepContents: enhancedStepContents,
          userGoal: userGoal,
          learningFocus: learningFocus,
          musicStyle: musicStyle,
          musicVoice: musicVoice,
          pictureBookStyle: pictureBookStyle,
          characterType: characterType,
        }),
      });
    } catch (e) {
      console.error('❌ 保存历史记录失败：', e?.message || e);
    }
  }

  function hideHistoryModal() {
    const modal = $('historyModal');
    if (modal) {
      modal.style.display = 'none';
      modal.classList.remove('active');
    }
  }

  async function loadHistoryList() {
    const historyListEl = $('historyList');
    if (!historyListEl) return;
    historyListEl.innerHTML = '<div class="history-loading" style="text-align: center; color: var(--muted); padding: 40px;">正在加载历史记录...</div>';

    try {
      const resp = await fetch('/api/history');
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data?.error || `HTTP ${resp.status}`);

      historyData = data.history || [];
      if (historyData.length === 0) {
        historyListEl.innerHTML = '<div class="history-empty" style="text-align: center; color: var(--muted); padding: 40px;">暂无历史记录</div>';
        $('historyPagination').style.display = 'none';
        return;
      }

      historyData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      historyCurrentPage = 1;
      renderHistoryPage();
    } catch (e) {
      historyListEl.innerHTML = `<div class="history-empty" style="color: var(--brand-shadow); text-align: center; padding: 40px;">加载失败：${e?.message || e}</div>`;
      $('historyPagination').style.display = 'none';
    }
  }

  function renderHistoryPage() {
    const historyListEl = $('historyList');
    const paginationEl = $('historyPagination');
    if (!historyListEl || !paginationEl) return;

    const totalPages = Math.ceil(historyData.length / historyPageSize);
    const startIndex = (historyCurrentPage - 1) * historyPageSize;
    const endIndex = startIndex + historyPageSize;
    const currentPageData = historyData.slice(startIndex, endIndex);

    if (currentPageData.length === 0) {
      historyListEl.innerHTML = '<div class="history-empty" style="text-align: center; color: var(--muted); padding: 40px;">暂无历史记录</div>';
      paginationEl.style.display = 'none';
      return;
    }

    historyListEl.innerHTML = currentPageData.map(item => {
      const date = new Date(item.createdAt);
      const canDeleteAudio = item.hasAudio !== false;
      const dateStr = date.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });

      return `
        <div class="history-item">
          <div class="history-item-content">
            <div class="history-item-title" style="font-size: 20px; font-weight: 800; color: var(--brand-2-shadow); margin-bottom: 8px;">${item.userGoal || '未命名'}</div>
            <div class="history-item-meta-row" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
              <div class="history-item-meta" style="color: var(--muted); font-weight: 600;">
                <div>${dateStr}</div>
                <div>共 ${item.stepCount} 个步骤</div>
              </div>
              <div style="display: flex; gap: 8px;">
                <button class="history-item-btn" style="padding: 8px 16px; border-radius: 12px; background: var(--brand-2); border: none; color: white; cursor: pointer; font-weight: 800; box-shadow: 0 4px 0 var(--brand-2-shadow);" onclick="importHistory('${item.sessionId}')">📥 导入</button>
                <button class="history-item-btn" style="padding: 8px 16px; border-radius: 12px; background: var(--brand); border: none; color: white; cursor: pointer; font-weight: 800; box-shadow: 0 4px 0 var(--brand-shadow);" onclick="deleteHistoryMusic('${item.sessionId}')" ${canDeleteAudio ? '' : 'disabled'}>🗑 删音乐</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    if (totalPages > 1) {
      paginationEl.style.display = 'flex';
      $('historyPageInfo').textContent = `${historyCurrentPage} / ${totalPages}`;
      $('historyPrevBtn').disabled = historyCurrentPage === 1;
      $('historyNextBtn').disabled = historyCurrentPage === totalPages;
    } else {
      paginationEl.style.display = 'none';
    }
  }

  function historyPrevPage() { if (historyCurrentPage > 1) { historyCurrentPage--; renderHistoryPage(); } }
  function historyNextPage() {
    const totalPages = Math.ceil(historyData.length / historyPageSize);
    if (historyCurrentPage < totalPages) { historyCurrentPage++; renderHistoryPage(); }
  }

  async function importHistory(sessionId) {
    if (!sessionId) { alert('无效的历史记录ID'); return; }

    try {
      const resp = await fetch(`/api/history/${sessionId}`);
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data?.error || `HTTP ${resp.status}`);

      const historyData = data.data;
      if (!historyData) throw new Error('历史记录数据为空');

      decomposedData = historyData.decomposedData;
      currentStepIndex = 0;

      const firstItem = historyData.stepContents && historyData.stepContents[0] ? historyData.stepContents[0] : null;
      const hasStructuredLyrics = !!(firstItem && Array.isArray(firstItem.steps_lyrics) && firstItem.steps_lyrics.length === 4);

      if (hasStructuredLyrics) {
        const stepsLyrics = firstItem.steps_lyrics.map(s => String(s ?? ''));
        stepContents = historyData.stepContents.map((item, index) => ({
          lyrics: stepsLyrics[index] || '',
          imageUrl: item.imageUrl,
          audioUrl: item.audioUrl,
          audioDeleted: !!item.audioDeleted,
          lyricsUrl: item.lyricsUrl,
          lyricsError: item.lyricsError || null,
          imageError: item.imageError || null,
          audioError: item.audioError || null,
        }));
      } else {
        stepContents = await Promise.all(historyData.stepContents.map(async (item, index) => {
          let lyricsContent = item.lyrics || '';
          let lyricsErr = item.lyricsError || null;
          if (item.lyricsUrl && !lyricsContent) {
            try {
              const lyricsResp = await fetch(item.lyricsUrl);
              if (lyricsResp.ok) lyricsContent = await lyricsResp.text();
              else lyricsErr = `Failed to load lyrics from Blob (status: ${lyricsResp.status})`;
            } catch (e) {
              lyricsErr = `Error fetching lyrics from Blob: ${e.message}`;
            }
          }
          return {
            lyrics: lyricsContent,
            imageUrl: item.imageUrl, 
            audioUrl: item.audioUrl, 
            audioDeleted: !!item.audioDeleted,
            lyricsUrl: item.lyricsUrl,
            lyricsError: lyricsErr,
            imageError: item.imageError || null,
            audioError: item.audioError || null,
          };
        }));
      }

      if (historyData.userGoal) $('userGoal').value = historyData.userGoal;
      if (historyData.learningFocus) $('learningFocus').value = historyData.learningFocus;
      if (historyData.musicStyle) $('musicStyle').value = historyData.musicStyle;
      if (historyData.musicVoice) $('musicVoice').value = historyData.musicVoice;
      if (historyData.pictureBookStyle) $('pictureBookStyle').value = historyData.pictureBookStyle;
      if (historyData.characterType) $('characterType').value = historyData.characterType;

      currentSessionId = sessionId;

      try {
        const importedAudioUrl = stepContents?.find(c => c && c.audioUrl && !c.audioError)?.audioUrl;
        if (importedAudioUrl) {
          ensureGlobalAudioSource(importedAudioUrl);
          initGlobalAudioIfNeeded();
          updateGlobalAudioUI();
        } else {
          clearGlobalAudioSource();
        }
      } catch (e) {}

      if (decomposedData.character_name) $('characterName').value = decomposedData.character_name;
      if (decomposedData.character_name || decomposedData.character_description || decomposedData.character_sheet) {
        $('characterInfo').style.display = 'block';
        const characterName = $('characterName').value.trim() || decomposedData.character_name || '乐乐';
        const cs = decomposedData.character_sheet;
        const csText = cs && cs.reference_prompt ? cs.reference_prompt : '';
        $('characterDetails').innerHTML = `
          <div><strong>角色：</strong>${characterName}</div>
          <div style="margin-top: 4px;"><strong>描述：</strong>${decomposedData.character_description || '可爱的学习伙伴'}</div>
          ${csText ? `<div style="margin-top: 8px;"><strong>设定卡：</strong>${csText}</div>` : ''}
        `;
      }

      $('stepsSection').style.display = 'block';
      $('welcomeMessage').style.display = 'none';
      $('stepsContainer').style.display = 'block';

      renderStepIndicator();
      renderStepContents();
      showCurrentStep();
      updateNavigationButtons();
      hideHistoryModal();
      alert('✅ 历史记录导入成功！');
    } catch (e) {
      alert('导入失败：' + (e?.message || e));
    }
  }

  window.togglePlayPause = togglePlayPause;
  window.restartAudio = restartAudio;
  window.seekAudio = seekAudio;
  window.saveStepContent = saveStepContent;
  window.downloadLyrics = downloadLyrics;
  window.downloadImage = downloadImage;
  window.downloadAudio = downloadAudio;
  window.downloadAllStepContent = downloadAllStepContent;
  window.showHistoryModal = showHistoryModal;
  window.hideHistoryModal = hideHistoryModal;
  window.importHistory = importHistory;
  window.historyPrevPage = historyPrevPage;
  window.historyNextPage = historyNextPage;
  window.deleteHistoryMusic = deleteHistoryMusic;
  window.deleteCurrentSessionMusic = deleteCurrentSessionMusic;

  setupCustomInputs();
  setAppEnabled(false);

  $('btnOpenLogin').addEventListener('click', () => openAuthModal('login'));
  $('btnOpenRegister').addEventListener('click', () => openAuthModal('register'));
  $('btnCloseAuthModal').addEventListener('click', closeAuthModal);
  $('authModal').addEventListener('click', (event) => {
    if (event.target === $('authModal')) closeAuthModal();
  });
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') closeAuthModal();
  });
  $('btnLogin').addEventListener('click', loginAccount);
  $('btnRegister').addEventListener('click', registerAccount);
  $('btnSendCode').addEventListener('click', sendSmsCode);
  $('btnLogout').addEventListener('click', logoutAccount);
  $('btnDeleteMusic').addEventListener('click', deleteCurrentSessionMusic);
  $('btnDecompose').addEventListener('click', decomposeGoal);
  $('btnPrev').addEventListener('click', goToPrevStep);
  $('btnNext').addEventListener('click', goToNextStep);
  $('btnRegenerate').addEventListener('click', regenerateCurrentStep);
  $('btnGenerateAll').addEventListener('click', generateAllSteps);
  restoreLogin();
</script>
</body>
</html>
